version: '3.6'


services:
  boilerplate-api:
    environment:
      - ASPNETCORE_ENVIRONMENT=Development
      - ASPNETCORE_URLS=https://+:7123;http://+:7122
      - ASPNETCORE_Kestrel__Certificates__Default__Password=yourpassword
      - ASPNETCORE_Kestrel__Certificates__Default__Path=/https/aspnetapp.pfx
      - ConnectionStrings__DefaultConnection=server=db-server;port=3306;database=FormationDb;user=app_user;password=myHardCoreDevDb123;
    ports:
      - "7123:7123"
      - "7122:7122"
    volumes:
      - ./https:/https/:ro
    networks:
      - localdev
