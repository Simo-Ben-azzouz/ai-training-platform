# docker-compose up -d
# docker-compose down

version: "3.6"
networks:
  localdev:
    name: localdev

services:
  db-server:
    image: mysql:8.4
    container_name: db-server
    ports:
      - "3306:3306"
    networks:
      - localdev
    environment:
      - MYSQL_ROOT_PASSWORD=root
      - MYSQL_USER=app_user
      - MYSQL_PASSWORD=myHardCoreDevDb123
      - MYSQL_DATABASE=FormationDb
  boilerplate-api:
    build:
      context: .
      dockerfile: src/Boilerplate.Api/Dockerfile
    image: boilerplate-api:local
    container_name: boilerplate-api
    depends_on:
      - db-server
    networks:
      - localdev

volumes:
  sqlvolume:
